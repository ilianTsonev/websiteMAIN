<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>memelian4.site</title>
  <style>
    body {
      margin: 0;
      min-height: 55vh;
      display: grid;
      place-items: center;
      background-image: url('IMG_5400.jpg');
      background-size: cover;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: #ffffff;
    }
    #title {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 1.2rem;
    }
    #version {
      display: inline-block;
    }
    #tumbleweed {
      position: absolute;
      bottom: 0px;
      left: 0;
      width: 180px;
      height: 180px; /* smaller size with squished aspect ratio */
      background-image: url('tumbleweed.gif');
      background-repeat: no-repeat;
      background-size: 100% 100%;
      animation: tumbleweed 10s infinite;
    }
  </style>
</head>
<body>
  <div id="title">memelian4.site <div id="version">4</div></div>
  <div id="tumbleweed"></div>
  <script>
    const tumbleweed = document.getElementById('tumbleweed');
    let position = 0;

    // Tuning Knobs. just like door knobs.
    let speed = 4;         
    const arcWidth = 250;    
    const maxHeight = 100;   
    let iteration = 0;
      
    function animateTumbleweed() {
      speed += iteration * 0.000001; // Gradually increase speed over time
      position += speed;
      if (position > window.innerWidth) {
        position = -tumbleweed.offsetWidth; 
      }
      tumbleweed.style.left = position + 'px';

      
      const cycleX = position % arcWidth;
      
      const normalizedX = (cycleX / arcWidth) * 2 - 1;

      
      const bounce = maxHeight * (1 - (normalizedX * normalizedX));
      
      tumbleweed.style.bottom = bounce + 'px';
      document.getElementById('version').textContent = speed.toFixed(2); // Display speed in the version div
      requestAnimationFrame(animateTumbleweed);
      iteration++;
    }

    animateTumbleweed();
  </script>
</body>
</html>
